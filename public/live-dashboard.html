<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>q-gagarin live triangles</title>
  <link rel="stylesheet" href="/live-dashboard.css">
  <script src="/vendor/plotly.min.js"></script>
</head>
<body>
  <main class="app-shell">
    <header class="topbar">
      <div>
        <h1>q-gagarin live triangles</h1>
        <p id="connectionLine">Connecting...</p>
      </div>
      <div class="actions">
        <button id="observeButton" type="button">Observe</button>
        <button id="dryRunButton" type="button">Dry Run</button>
        <button id="realGuardedButton" type="button">Real Guarded</button>
        <button id="pauseButton" type="button">Pause</button>
        <button id="stopButton" type="button">Stop</button>
      </div>
    </header>

    <nav class="tabs" role="tablist" aria-label="Dashboard tabs">
      <button class="tab-button" type="button" role="tab" aria-selected="false" data-tab-target="market">Market</button>
      <button class="tab-button" type="button" role="tab" aria-selected="false" data-tab-target="strategy">Strategy</button>
      <button class="tab-button active" type="button" role="tab" aria-selected="true" data-tab-target="arbitrage">Arbitrage Desk</button>
      <button class="tab-button" type="button" role="tab" aria-selected="false" data-tab-target="execution">Execution</button>
      <button class="tab-button" type="button" role="tab" aria-selected="false" data-tab-target="system">System</button>
      <button class="tab-button" type="button" role="tab" aria-selected="false" data-tab-target="logs">Logs</button>
      <button class="tab-button" type="button" role="tab" aria-selected="false" data-tab-target="settings">Settings</button>
    </nav>

    <section id="tab-market" class="tab-panel" role="tabpanel" data-tab-panel="market" hidden>
      <section id="summaryCards" class="summary-grid" aria-label="Market summary"></section>

      <div class="panel-grid">
        <section class="panel-block">
          <div class="section-head">
            <h2>Exchanges</h2>
          </div>
          <div id="exchangeCards" class="status-list"></div>
        </section>

        <section class="panel-block">
          <div class="section-head">
            <h2>Market Read Model</h2>
          </div>
          <div id="marketConfigCards" class="status-list"></div>
        </section>
      </div>
    </section>

    <section id="tab-strategy" class="tab-panel placeholder-panel" role="tabpanel" data-tab-panel="strategy" hidden>
      <div id="strategyCards" class="status-list wide"></div>
      <div id="strategyList" class="strategy-list"></div>
    </section>

    <section id="tab-arbitrage" class="tab-panel active" role="tabpanel" data-tab-panel="arbitrage">
      <section class="workspace">
        <div class="chart-panel">
          <div class="controls">
            <label class="check-row">
              <input id="autoScaleInput" type="checkbox" checked>
              <span>Auto-scale y-axis</span>
            </label>
            <label class="check-row">
              <input id="showUnavailableInput" type="checkbox">
              <span>Show unavailable</span>
            </label>
          </div>

          <div id="groupFilters" class="group-filters" aria-label="Group filters"></div>

          <div class="legend">
            <span><i class="legend-dot pink"></i>Profitable</span>
            <span><i class="legend-dot pink diamond"></i>Reverse direction</span>
            <span><i class="legend-dot neutral"></i>Neutral</span>
            <span><i class="legend-dot gray"></i>Unavailable or stale</span>
          </div>

          <div id="chart" class="chart"></div>
        </div>

        <aside class="detail-panel">
          <div class="detail-head">
            <h2>Route detail</h2>
            <button id="unpinButton" type="button">Clear</button>
          </div>
          <div id="detailBody" class="detail-body">Click a point.</div>
        </aside>
      </section>
    </section>

    <section id="tab-execution" class="tab-panel placeholder-panel" role="tabpanel" data-tab-panel="execution" hidden>
      <div id="executionCards" class="status-list wide"></div>
      <div id="realRunTables" class="log-table"></div>
    </section>

    <section id="tab-system" class="tab-panel" role="tabpanel" data-tab-panel="system" hidden>
      <section id="performanceCards" class="summary-grid performance-grid" aria-label="Performance and latency"></section>
    </section>

    <section id="tab-logs" class="tab-panel placeholder-panel" role="tabpanel" data-tab-panel="logs" hidden>
      <div class="log-controls">
        <label>
          <span>Mode</span>
          <select id="logModeFilter">
            <option value="">All</option>
            <option value="DRY_RUN">DRY_RUN</option>
            <option value="REAL">REAL</option>
          </select>
        </label>
        <label>
          <span>Type</span>
          <select id="logTypeFilter">
            <option value="">All</option>
            <option value="decision">decision</option>
            <option value="rejection">rejection</option>
            <option value="order">order</option>
            <option value="fill">fill</option>
            <option value="position">position</option>
            <option value="error">error</option>
          </select>
        </label>
        <label>
          <span>Start asset</span>
          <select id="logStartAssetFilter">
            <option value="">All</option>
            <option value="KRW">KRW</option>
            <option value="BTC">BTC</option>
            <option value="USDT">USDT</option>
          </select>
        </label>
        <label>
          <span>Strategy</span>
          <input id="logStrategyFilter" type="text" placeholder="strategyId">
        </label>
        <label>
          <span>Cycle</span>
          <input id="logCycleFilter" type="text" placeholder="cycleId">
        </label>
        <button id="refreshLogsButton" type="button">Refresh</button>
        <button id="exportDryRunJsonButton" type="button">Export JSON</button>
        <button id="exportDryRunCsvButton" type="button">Export CSV</button>
      </div>
      <section id="dryRunSummaryCards" class="summary-grid" aria-label="Dry-run summary"></section>
      <div id="dryRunStartAssetTable" class="log-table"></div>
      <div id="logTable" class="log-table"></div>
    </section>

    <section id="tab-settings" class="tab-panel placeholder-panel" role="tabpanel" data-tab-panel="settings" hidden>
      <div id="settingsConfig" class="settings-config"></div>
    </section>

    <div id="toast" class="toast" role="status" aria-live="polite"></div>
  </main>

  <script src="/tabs/market.js"></script>
  <script src="/tabs/strategy.js"></script>
  <script src="/tabs/arbitrageDesk.js"></script>
  <script src="/tabs/execution.js"></script>
  <script src="/tabs/system.js"></script>
  <script src="/tabs/logs.js"></script>
  <script src="/tabs/settings.js"></script>
  <script src="/live-dashboard.js"></script>
</body>
</html>
